<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagrammes SFE FEC - Version Statique</title>
  <style>
    body { font-family: "Segoe UI", Tahoma, sans-serif; margin: 0; background: #f5f7fb; color: #1c2430; }
    header { padding: 20px; background: #0f3d66; color: #fff; }
    main { max-width: 1200px; margin: 20px auto; padding: 0 12px 24px; }
    section { background: #fff; border: 1px solid #dfe6ef; border-radius: 10px; margin-bottom: 16px; padding: 12px; }
    h1 { margin: 0; font-size: 24px; }
    h2 { margin: 0 0 10px; color: #0f3d66; font-size: 19px; }
    img { width: 100%; height: auto; border: 1px solid #e5edf7; border-radius: 6px; background: #fff; }
    @page { size: A4 landscape; margin: 12mm; }
  </style>
</head>
<body>
  <header>
    <h1>Diagrammes UML SFE FEC - Version Statique</h1>
  </header>
  <main>
    <section>
      <h2>1) Diagramme de cas d'utilisation</h2>
      <img src="diagrammes_svg/diag_01.svg" alt="Diagramme de cas d'utilisation" />
    </section>
    <section>
      <h2>2) Diagramme de classes</h2>
      <img src="diagrammes_svg/diag_02.svg" alt="Diagramme de classes" />
    </section>
    <section>
      <h2>3) Diagramme de sequence</h2>
      <img src="diagrammes_svg/diag_03.svg" alt="Diagramme de sequence" />
    </section>
    <section>
      <h2>4) Diagramme de flux</h2>
      <img src="diagrammes_svg/diag_04.svg" alt="Diagramme de flux" />
    </section>
    <section>
      <h2>5) Diagramme d'etats</h2>
      <img src="diagrammes_svg/diag_05.svg" alt="Diagramme d'etats" />
    </section>
    <section>
      <h2>6) Diagramme de composants</h2>
      <img src="diagrammes_svg/diag_06.svg" alt="Diagramme de composants" />
    </section>
    <section>
      <h2>7) Diagramme de packages</h2>
      <img src="diagrammes_svg/diag_07.svg" alt="Diagramme de packages" />
    </section>
    <section>
      <h2>8) Diagramme de deploiement</h2>
      <img src="diagrammes_svg/diag_08.svg" alt="Diagramme de deploiement" />
    </section>
  </main>
</body>
</html>
